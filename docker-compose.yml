version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: axpo-postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: axpo
      POSTGRES_PASSWORD: axpo_dev_password
      POSTGRES_DB: axpo_simulator
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axpo -d axpo_simulator"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: axpo-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@axpo.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - ./docker-data/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - with-ui

volumes:
  postgres-data:
  pgadmin-data:
