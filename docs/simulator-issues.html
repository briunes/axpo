const categoryLabels = {

const sections = [

  { key: "ocr",         label: "📄 OCR / Invoice Reading",   cats: ["ocr"] },
  { key: "calculation", label: "🧮 Calculations",            cats: ["calculation"] },
  { key: "results",     label: "📊 Results & Display",       cats: ["results"] },
  { key: "pdf",         label: "🖨️ PDF / Sharing",           cats: ["pdf"] },

function renderCard(issue) {
  const statusClass = issue.status === "open" ? "open" : issue.status === "closed" ? "closed" : issue.status === "ignored" ? "ignored" : "no-status";
  const statusTag = issue.status === "open"
    ? `<span class="tag tag-open">Open</span>`
    : issue.status === "closed"
    ? `<span class="tag tag-closed">Closed</span>`
    : issue.status === "ignored"
    ? `<span class="tag tag-ignored">Ignored</span>`
    : `<span class="tag tag-no-status">No status</span>`;

  const cats = issue.categories
    .filter(c => categoryLabels[c])
    .map(c => `<span class="tag tag-category">${categoryLabels[c]}</span>`)
    .join("");

  const comment = issue.comment
    ? `<div class="card-comment">${issue.comment}</div>`
    : "";

  const reporter = issue.reporter
    ? `<span class="reporter">— ${issue.reporter}</span>`
    : "";

  return `
    <div class="card ${statusClass}" data-cats="${issue.categories.join(" ")}" data-status="${issue.status}" data-text="${(issue.title + " " + issue.desc + " " + issue.comment).toLowerCase()}">
      <div class="card-num">#${issue.id}</div>
      <div class="card-body">
        <div class="card-title">${issue.title}</div>
        <div class="card-desc">${issue.desc}</div>
        ${comment}
        <div class="card-meta">${statusTag}${cats}${reporter}</div>
      </div>
    </div>`;
}

function render(filterKey = "all", searchVal = "") {
  const main = document.getElementById("main");
  const empty = document.getElementById("empty");
  main.innerHTML = "";
  main.appendChild(empty);

  // For each section, find matching issues
  let totalVisible = 0;

  sections.forEach(sec => {
    const matching = issues.filter(issue => {
      // Section match
      const inSection = issue.categories.some(c => sec.cats.includes(c));
      if (!inSection) return false;
      // Filter
      if (filterKey !== "all") {
        if (filterKey === "open" && issue.status !== "open") return false;
        if (filterKey === "closed" && issue.status !== "closed") return false;
        if (filterKey === "ignored" && issue.status !== "ignored") return false;
        if (!["all","open","closed","ignored"].includes(filterKey) && !issue.categories.includes(filterKey)) return false;
      }
      // Search
      if (searchVal && !issue.title.toLowerCase().includes(searchVal) && !issue.desc.toLowerCase().includes(searchVal) && !issue.comment.toLowerCase().includes(searchVal)) return false;
      return true;
    });

    if (matching.length === 0) return;
    totalVisible += matching.length;

    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `
      <div class="section-title">${sec.label} <span class="count">${matching.length}</span></div>
      <div class="cards">${matching.map(renderCard).join("")}</div>
    `;
    main.appendChild(section);
  });

  empty.style.display = totalVisible === 0 ? "block" : "none";
}

function updateStats() {
  document.getElementById("count-open").textContent = issues.filter(i => i.status === "open").length;
  document.getElementById("count-closed").textContent = issues.filter(i => i.status === "closed").length;
  document.getElementById("count-ignored").textContent = issues.filter(i => i.status === "ignored").length;
  document.getElementById("count-total").textContent = issues.length;
}

let activeFilter = "all";
let searchVal = "";

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    render(activeFilter, searchVal);
  });
});

document.getElementById("search").addEventListener("input", e => {
  searchVal = e.target.value.toLowerCase();
  render(activeFilter, searchVal);
});

updateStats();
render();
</script>
</body>
